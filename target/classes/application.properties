spring.application.name=client-profile
server.port=8082
spring.datasource.url=jdbc:h2:mem:clientprofiledb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Cross-Origin Resource Sharing
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH
spring.web.cors.allowed-headers=*

# Allow the application to accept requests from any IP
server.address=0.0.0.0

# WebClient Configuration
webclient.connection-timeout=5000
webclient.read-timeout=5000
webclient.write-timeout=5000
spring.h2.console.enabled=true
aws.region=ap-southeast-1
# need to change this
# aws.sns.topic.arn=arn:aws:sns:ap-southeast-1:123379395205:LogTopic
aws.sns.topic.arn=${SNS_TOPIC_ARN:dummy_variable_client}
logging.level.org.springframework.security=DEBUG
# show error message and stacktrace in HTTP error responses (DEV only)
server.error.include-message=always
server.error.include-stacktrace=always
# enable debug logging for your app and Spring Security
logging.level.com.example.client=DEBUG

cache.default.ttl=300
